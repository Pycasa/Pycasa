# Banner
quarkus.banner.enabled=true
quarkus.banner.path=banner.txt
# Couchbase Lite Configuration
couchbase.lite.database.name=pycasa
couchbase.lite.database.directory=${user.home}/.pycasa/couchbase

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# AI API configuration
quarkus.rest-client.ai-api.url=http://localhost:11434/api

# Server Configuration — single port for UI + API
quarkus.http.port=3000
quarkus.http.host=0.0.0.0

# JWT Configuration (disabled - using session-based auth instead)
# mp.jwt.verify.publickey.location=META-INF/publicKey.pem
# mp.jwt.verify.issuer=https://pycasa.local
# smallrye.jwt.sign.key.location=META-INF/privateKey.pem

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.pycasa".level=DEBUG
quarkus.log.category."io.github.ollama4j".level=INFO

# File logging — writes to ~/.pycasa/logs/pycasa.log
quarkus.log.file.enable=true
quarkus.log.file.path=${user.home}/.pycasa/logs/pycasa.log
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.file.rotation.rotate-on-boot=false

# Security - disable default auth (we use custom session-based auth)
quarkus.security.auth.enabled-in-dev-mode=false
quarkus.http.auth.permission.public.paths=/*
quarkus.http.auth.permission.public.policy=permit

# Development mode
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Swagger UI / OpenAPI
quarkus.swagger-ui.path=/docs
quarkus.swagger-ui.always-include=true

# =============================================================================
# Quinoa — embedded UI (https://quarkiverse.github.io/quarkiverse-docs/quarkus-quinoa)
# =============================================================================

# Location of the UI source (package.json lives here)
quarkus.quinoa.ui-dir=src/main/webapp

# The script Quinoa calls to build the UI for production
quarkus.quinoa.build-dir=dist
quarkus.quinoa.package-manager-install=false

# Dev mode: Quinoa starts the Vite dev server internally and proxies it.
# Vite listens on this port; Quarkus proxies everything through port 3000.
# You only ever open http://localhost:3000
%dev.quarkus.quinoa.dev-server.port=4173
%dev.quarkus.quinoa.dev-server.check-timeout=60000

# Forward the Vite HMR websocket through Quarkus
%dev.quarkus.quinoa.dev-server.websocket=true

# Paths that belong to the REST API — Quinoa will NOT proxy these to Vite
quarkus.quinoa.ignored-path-prefixes=/api,/storage,/docs,/q,/ws
