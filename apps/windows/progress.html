<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pycasa - Installing Dependencies</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-color: #0f1016;
            --card-bg: rgba(22, 24, 37, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.03) 0%, transparent 40%);
        }

        .container {
            width: 90%;
            max-width: 480px;
            padding: 2.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .logo-container {
            margin-bottom: 1.5rem;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .logo-circle {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent-color), #4f46e5);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 24px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .logo-circle::after {
            content: '';
            position: absolute;
            top: 0; left: -50%; width: 200%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .logo-icon {
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            user-select: none;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .progress-box {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #818cf8);
            border-radius: 10px;
            box-shadow: 0 0 12px var(--accent-glow);
            transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-text-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            font-size: 0.9rem;
        }

        .status {
            color: var(--text-muted);
            font-weight: 400;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 75%;
        }

        .percentage {
            color: var(--accent-color);
            font-weight: 700;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo-circle">
                <span class="logo-icon">P</span>
            </div>
        </div>
        <h2>Setting up Pycasa</h2>
        <p class="subtitle">Downloading and configuring Java Runtime Environment</p>
        
        <div class="progress-box">
            <div class="progress-bar-bg">
                <div id="progressBar" class="progress-bar-fill"></div>
            </div>
            <div class="progress-text-row">
                <div class="status">
                    <span id="spinner" class="spinner"></span>
                    <span id="statusText">Initializing...</span>
                </div>
                <div class="percentage"><span id="percentText">0</span>%</div>
            </div>
        </div>
        
        <div class="footer">
            This setup happens only once. Pycasa will open automatically.
        </div>
    </div>

    <script>
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const percentText = document.getElementById('percentText');
        const spinner = document.getElementById('spinner');

        // Connect to the SSE progress endpoint
        const eventSource = new EventSource('/progress');

        eventSource.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                const percent = data.percent;
                const status = data.status;

                progressBar.style.width = percent + '%';
                percentText.textContent = percent;
                statusText.textContent = status;

                if (percent >= 100) {
                    spinner.style.display = 'none';
                    // The server will close this Edge window, but as backup:
                    setTimeout(() => {
                        eventSource.close();
                    }, 1000);
                }
            } catch (err) {
                console.error("Error parsing progress message:", err);
            }
        };

        eventSource.onerror = function(err) {
            console.error("EventSource failed:", err);
            statusText.textContent = "Reconnecting to setup server...";
        };
    </script>
</body>
</html>
