name: Release

on:
  release:
    types: [ created ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-jar:
    name: Build Uber-JAR
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      jar-name: ${{ steps.find-jar.outputs.jar-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set release version
        run: |
          VERSION="${{ github.ref_name }}"
          # Strip leading 'v' (v1.2.3 → 1.2.3)
          mvn versions:set -B -DnewVersion="${VERSION#v}" -DgenerateBackupPoms=false

      - name: Build uber-jar
        run: mvn clean package -B -DskipTests

      - name: Find JAR name
        id: find-jar
        run: |
          JAR=$(ls target/*-runner.jar | head -1 | xargs basename)
          echo "jar-name=${JAR}" >> "$GITHUB_OUTPUT"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycasa-runner
          path: target/*-runner.jar
          retention-days: 7

  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            pycasa/pycasa
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-and-push-docker]

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: pycasa-runner
          path: release-assets/

      - name: Rename JAR with version tag
        run: |
          VERSION="${{ github.ref_name }}"
          JAR=$(ls release-assets/*-runner.jar | head -1)
          mv "$JAR" "release-assets/pycasa-${VERSION}-runner.jar"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/pycasa-${{ github.ref_name }}-runner.jar
          body: |
            ## Docker Image

            Pull from GitHub Container Registry:
            ```
            echo <GITHUB_TOKEN> | docker login ghcr.io -u <YOUR_GITHUB_USERNAME> --password-stdin
            docker run -d -p 3000:3000 -v ~/Pictures:/photos ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            Or pull from Docker Hub:
            ```
            docker run -d -p 3000:3000 -v ~/Pictures:/photos pycasa/pycasa:${{ github.ref_name }}
            ```

            ## JAR

            Download the `pycasa-${{ github.ref_name }}-runner.jar` asset below and run with:
            ```
            java -jar pycasa-${{ github.ref_name }}-runner.jar
            ```
