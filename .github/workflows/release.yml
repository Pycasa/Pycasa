name: Release

on:
  release:
    types: [ created ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-jar:
    name: Build Uber-JAR
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      jar-name: ${{ steps.find-jar.outputs.jar-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # - name: Find and Replace
      #   uses: jacobtomlinson/gha-find-replace@v3
      #   with:
      #     find: "pycasa-revision"
      #     replace: ${{ github.ref_name }}
      #     regex: false

      - name: Set release version
        run: |
          VERSION="${{ github.ref_name }}"
          # Strip leading 'v' (v1.2.3 → 1.2.3)
          mvn versions:set -B -DnewVersion="${VERSION#v}" -DgenerateBackupPoms=false

      - name: Build uber-jar
        run: mvn clean package -B -DskipTests

      - name: Find JAR name
        id: find-jar
        run: |
          JAR=$(ls target/*-runner.jar | head -1 | xargs basename)
          echo "jar-name=${JAR}" >> "$GITHUB_OUTPUT"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycasa-runner
          path: target/*-runner.jar
          retention-days: 7

  build-windows-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: [build-jar]

    permissions:
      contents: write

    defaults:
      run:
        working-directory: apps/windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download server JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: pycasa-runner
          path: jar-download/

      - name: Move JAR into apps/windows/ (flatten)
        shell: pwsh
        run: |
          $jar = Get-ChildItem -Path "${{ github.workspace }}/jar-download" -Recurse -Filter "*runner.jar" | Select-Object -First 1
          if (!$jar) { Write-Error "JAR not found in artifact"; exit 1 }
          Copy-Item $jar.FullName -Destination "${{ github.workspace }}/apps/windows/$($jar.Name)"
          Write-Host "JAR ready: $($jar.Name)"
        working-directory: ${{ github.workspace }}

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}"
          if (-not $v -or $v -eq "") { $v = "dev" }
          # Sanitize: replace chars invalid in Windows filenames
          $v = $v -replace '[/\\:*?"<>|]', '-'
          Write-Host "Version: $v"
          "value=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/windows/go.mod
          cache-dependency-path: apps/windows/go.sum

      - name: Fetch Go dependencies
        run: go mod download

      - name: Install rsrc (icon embedder)
        run: go install github.com/akavel/rsrc@latest

      - name: Generate resource.syso (embed icon)
        run: rsrc -ico favicon.ico -o resource.syso

      - name: Build Pycasa.exe
        run: go build -ldflags "-H windowsgui -s -w" -o Pycasa.exe .

      - name: Install Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Generate installer branding images
        run: powershell -NoProfile -ExecutionPolicy Bypass -File make-installer-images.ps1

      - name: Verify files before ISCC
        run: |
          Write-Host "=== Files in apps/windows ==="
          Get-ChildItem | Select-Object Name, Length | Format-Table
          $jar = Get-ChildItem -Filter "*runner.jar"
          if (!$jar) { Write-Error "JAR missing - installer will not be self-contained"; exit 1 }
          Write-Host "JAR found: $($jar.Name) ($([math]::Round($jar.Length/1MB,1)) MB)"

      - name: Build PycasaSetup-{version}.exe (self-contained installer)
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$version" pycasa.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "Inno Setup failed"; exit 1 }
          $installer = Get-Item "dist\PycasaSetup-${version}.exe"
          Write-Host "$($installer.Name) -- $([math]::Round($installer.Length/1MB,2)) MB (JAR bundled)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pycasa-windows-installer
          path: apps/windows/dist/PycasaSetup-${{ steps.version.outputs.value }}.exe
          retention-days: 14

  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            pycasa/pycasa
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-and-push-docker, build-windows-installer]

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: pycasa-runner
          path: release-assets/

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: Pycasa-windows-installer
          path: release-assets/

      - name: Rename JAR with version tag
        run: |
          VERSION="${{ github.ref_name }}"
          JAR=$(ls release-assets/*-runner.jar | head -1)
          mv "$JAR" "release-assets/pycasa-${VERSION}-runner.jar"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/pycasa-${{ github.ref_name }}-runner.jar
            release-assets/PycasaSetup-${{ github.ref_name }}.exe
          body: |
            ## Docker Image

            Pull and run from Docker Hub:
            ```
            docker run -d -p 3000:3000 -v ~/Pictures:/photos pycasa/pycasa:${{ github.ref_name }}
            ```

            Or pull and run from GitHub Container Registry:
            ```
            echo <GITHUB_TOKEN> | docker login ghcr.io -u <YOUR_GITHUB_USERNAME> --password-stdin
            docker run -d -p 3000:3000 -v ~/Pictures:/photos ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            ## JAR

            Download the `pycasa-${{ github.ref_name }}-runner.jar` asset below and run with:
            ```
            java -jar pycasa-${{ github.ref_name }}-runner.jar
            ```
            
            And, as always, to download and run latest:
            ```
            curl -fsSL https://raw.githubusercontent.com/Pycasa/Pycasa/main/install.sh | bash
            ```